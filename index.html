<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Analytics (cookieless, GDPR-native) ───────────── -->
    <script defer data-domain="datajagers.nl" src="https://plausible.io/js/script.js"></script>

    <!-- ── Canonical ──────────────────────────────────────── -->
    <link rel="canonical" href="https://datajagers.nl/" />

    <!-- ── Favicons ───────────────────────────────────────── -->
    <link rel="icon" type="image/png" href="/assets/favicon.png" />
    <link rel="apple-touch-icon" href="/assets/apple_touch_icon.png" />

    <!-- ── Primary meta ───────────────────────────────────── -->
    <title>Datajagers — Imagine. Build. Innovate.</title>
    <meta name="description" content="Datajagers is a strategic data consultancy helping businesses optimize processes, structure messy data, uncover hidden insights, and build custom tools — all under one roof." />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="author" content="Wouter Jagers" />

    <!-- ── Open Graph ─────────────────────────────────────── -->
    <meta property="og:site_name" content="Datajagers" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:url" content="https://datajagers.nl/" />
    <meta property="og:title" content="Datajagers — Imagine. Build. Innovate." />
    <meta property="og:description" content="Strategic data partner for businesses that want to optimize, structure, and build. Process optimization, data architecture, analysis, and custom AI tools." />
    <meta property="og:image" content="https://datajagers.nl/assets/socialpreview.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Datajagers — Imagine. Build. Innovate." />

    <!-- ── Twitter / X ────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Datajagers — Imagine. Build. Innovate." />
    <meta name="twitter:description" content="Strategic data partner for businesses that want to optimize, structure, and build. Process optimization, data architecture, analysis, and custom AI tools." />
    <meta name="twitter:image" content="https://datajagers.nl/assets/socialpreview.png" />
    <meta name="twitter:image:alt" content="Datajagers — Imagine. Build. Innovate." />

    <!-- ── JSON-LD structured data ────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Datajagers",
      "url": "https://datajagers.nl",
      "email": "wouter.jagers@datajagers.nl",
      "description": "Strategic data consultancy helping businesses optimize processes, structure data, uncover insights, and build custom tools and AI solutions.",
      "slogan": "Imagine. Build. Innovate.",
      "foundingDate": "2023",
      "founder": {
        "@type": "Person",
        "name": "Wouter Jagers",
        "jobTitle": "Business Analyst & Data Consultant",
        "email": "wouter.jagers@datajagers.nl"
      },
      "areaServed": [
        {
          "@type": "Country",
          "name": "Netherlands"
        },
        {
          "@type": "Country",
          "name": "Belgium"
        }
      ],
      "knowsAbout": [
        "Process Optimization",
        "Lean Six Sigma",
        "Data Architecture",
        "Business Intelligence",
        "Data Analysis",
        "Custom Software Development",
        "AI Tools",
        "Business Analysis",
        "Dashboard Development"
      ],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Datajagers Services",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Process Optimization",
              "description": "Identifying and eliminating bottlenecks using Lean Six Sigma methodology."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Data Architecture & Dashboards",
              "description": "Turning messy data into structured, actionable systems and visual dashboards."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Data Analysis",
              "description": "Uncovering hidden patterns and insights from your business data."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Custom Software & Tools",
              "description": "Building bespoke automations, tools, and AI-powered solutions."
            }
          }
        ]
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer enquiries",
        "email": "wouter.jagers@datajagers.nl",
        "availableLanguage": ["English", "Dutch"]
      },
      "sameAs": []
    }
    </script>
  </head>
  <body>
    <!-- Hidden form so Netlify's build bot can detect the form fields -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input name="bot-field" />
      <input name="name" />
      <input name="email" />
      <input name="service" />
      <textarea name="message"></textarea>
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
